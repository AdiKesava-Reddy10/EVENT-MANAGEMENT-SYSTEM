<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Manage Event')}"></head>
<body class="bg-gray-50 text-gray-800 font-sans tracking-wide min-h-screen flex flex-col pt-16">
    <nav th:replace="~{layout :: navbar}"></nav>
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
        
        <div class="mb-6">
            <a th:href="@{/admin}" class="text-sm text-gray-500 hover:text-primary transition-colors flex items-center gap-1">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-gray-100 bg-gray-50">
                <h2 class="text-2xl font-bold text-gray-900" th:text="${event.id == null ? 'Create New Event' : 'Edit Event: ' + event.title}">Manage Event</h2>
                <p class="text-gray-500 text-sm mt-1">Fill in the details below to publish an event to the campus portal.</p>
            </div>
            
            <form th:action="${event.id == null ? '/admin/event/save' : '/admin/event/update'}" th:object="${event}" method="post" class="p-8">
                <input type="hidden" th:field="*{id}" />
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Event Title <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{title}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm" placeholder="e.g. Annual Tech Symposium 2026">
                        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-red-500">*</span></label>
                        <textarea th:field="*{description}" rows="4" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm" placeholder="Provide event agenda and details..."></textarea>
                        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Date <span class="text-red-500">*</span></label>
                        <input type="date" th:field="*{date}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm">
                        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Time</label>
                        <input type="time" th:field="*{time}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Department <span class="text-red-500">*</span></label>
                        <select th:field="*{department}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm">
                            <option value="">Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                            <option value="Business">Business</option>
                            <option value="General">General / All</option>
                        </select>
                        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Event Type <span class="text-red-500">*</span></label>
                        <select th:field="*{type}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm">
                            <option value="">Select Type</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Seminar">Seminar</option>
                            <option value="Cultural">Cultural</option>
                            <option value="Sports">Sports</option>
                            <option value="Hackathon">Hackathon</option>
                            <option value="Other">Other</option>
                        </select>
                        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Location <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{location}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm" placeholder="e.g. Main Auditorium">
                        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Organizer (Optional)</label>
                        <input type="text" th:field="*{organizer}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm" placeholder="e.g. Dr. Smith / Tech Club">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Total Seats Capacity (Optional)</label>
                        <input type="number" th:field="*{totalSeats}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm" placeholder="Leave empty for unlimited">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Banner Image URL (Optional)</label>
                        <input type="url" th:field="*{imageUrl}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary text-sm transition-shadow shadow-sm" placeholder="https://example.com/image.jpg">
                        <p class="text-xs text-gray-500 mt-1">Provide a direct link to an image. If left blank, a default placeholder will be used.</p>
                    </div>
                </div>
                
                <div class="border-t border-gray-100 pt-6 flex justify-end gap-3">
                    <a th:href="@{/admin}" class="px-6 py-3 border border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gray-200">Cancel</a>
                    <button type="submit" class="px-6 py-3 bg-primary text-white rounded-xl font-medium hover:bg-indigo-700 transition-colors shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary flex items-center gap-2">
                        <i class="fa-solid fa-save"></i> Save Event
                    </button>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
