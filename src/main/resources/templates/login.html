<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { primary: '#4f46e5', dark: '#1f2937' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <i class="fa-solid fa-graduation-cap text-primary text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">Welcome Back</h2>
            <p class="text-gray-500 mt-2 text-sm">Sign in to your Smart Campus account.</p>
        </div>
        
        <div th:if="${param.error}" class="mb-4 bg-red-50 text-red-600 p-3 rounded-xl text-sm border border-red-200 text-center">
            Invalid username or password.
        </div>
        
        <div th:if="${param.logout}" class="mb-4 bg-green-50 text-green-600 p-3 rounded-xl text-sm border border-green-200 text-center">
            You have been logged out out successfully.
        </div>
        
        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="username" name="username" class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary sm:text-sm transition-shadow" placeholder="student123" required>
                </div>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" name="password" class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary sm:text-sm transition-shadow" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded text-indigo-600">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700 font-medium">
                        Remember me
                    </label>
                </div>
                
                <div class="text-sm">
                    <a href="#" class="font-medium text-primary hover:text-indigo-500">Forgot password?</a>
                </div>
            </div>
            
            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-primary hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                Sign in
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-gray-600">
            Don't have an account? <a href="/signup" class="font-bold text-primary hover:text-indigo-500 transition-colors">Sign up</a>
        </p>
        <p class="mt-4 text-center text-sm text-gray-500">
            <a th:href="@{/}" class="hover:text-primary"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Home</a>
        </p>
    </div>

</body>
</html>
