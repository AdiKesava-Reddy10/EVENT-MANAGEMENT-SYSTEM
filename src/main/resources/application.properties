# Server port
server.port=8082

# ---- DATABASE CONFIGURATION ----
# Currently using H2 Database so the application can run immediately without errors.
# To use MySQL, comment out the H2 section and uncomment the MySQL section below.

# --- H2 Database (Active) ---
spring.datasource.url=jdbc:h2:file:./data/eventsystem_db_v3;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL Database (Commented out) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/event_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mail Configuration (Example settings, replace with actual)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremail@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
