<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Smart Campus Event Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { primary: '#4f46e5', secondary: '#10b981', dark: '#1f2937' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(229, 231, 235, 0.5); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans tracking-wide min-h-screen flex flex-col pt-16">

    <nav th:fragment="navbar" class="glass-nav fixed w-full z-50 top-0 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center gap-2">
                        <i class="fa-solid fa-graduation-cap text-primary text-2xl"></i>
                        <span class="font-bold text-xl text-dark tracking-tight">SmartCampus</span>
                    </a>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden sm:flex sm:items-center sm:space-x-8">
                    <a href="/" class="text-gray-600 hover:text-primary transition-colors px-3 py-2 text-sm font-medium">Home</a>
                    <span sec:authorize="hasRole('ROLE_STUDENT')">
                        <a href="/student/dashboard" class="text-gray-600 hover:text-primary transition-colors px-3 py-2 text-sm font-medium">My Dashboard</a>
                    </span>
                    <span sec:authorize="hasRole('ROLE_ADMIN')">
                        <a href="/admin" class="text-gray-600 hover:text-primary transition-colors px-3 py-2 text-sm font-medium">Admin Dashboard</a>
                    </span>
                    <span sec:authorize="!isAuthenticated()">
                        <a href="/login" class="text-gray-600 hover:text-primary transition-colors px-3 py-2 text-sm font-medium">Log in</a>
                        <a href="/signup" class="bg-primary text-white hover:bg-indigo-700 px-4 py-2 rounded-full text-sm font-medium transition-all shadow-md hover:shadow-lg">Sign up</a>
                    </span>
                    <span sec:authorize="isAuthenticated()" class="flex items-center gap-4">
                        <span class="text-sm font-medium text-gray-500">Hi, <span sec:authentication="name" class="font-semibold text-gray-800"></span></span>
                        <form th:action="@{/logout}" method="post" class="inline">
                            <button type="submit" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-4 py-2 rounded-full text-sm font-medium transition-colors border border-red-200">
                                <i class="fa-solid fa-sign-out-alt mr-1"></i> Logout
                            </button>
                        </form>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0 flex items-center gap-2">
                    <i class="fa-solid fa-graduation-cap text-primary text-xl"></i>
                    <span class="font-bold text-lg text-dark">SmartCampus Events</span>
                </div>
                <p class="text-center text-sm text-gray-500">
                    &copy; 2026 Smart Campus Event Management System. All rights reserved.
                </p>
                <div class="flex space-x-6 mt-4 md:mt-0">
                    <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="fa-brands fa-twitter text-xl"></i></a>
                    <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="fa-brands fa-github text-xl"></i></a>
                    <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="fa-brands fa-linkedin text-xl"></i></a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
